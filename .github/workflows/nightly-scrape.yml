name: Nightly Scrape

on:
  schedule:
    - cron: '0 1 * * *'  # 2am Irish summer time (1am UTC)
  workflow_dispatch:       # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: derelict-scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r derelict-scraper/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Scrape, geocode and publish
        working-directory: derelict-scraper
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SUPABASE_UPSERT_URL: ${{ secrets.SUPABASE_UPSERT_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python main.py --geocode --publish

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add derelict-scraper/data/derelict_sites.db
          git diff --staged --quiet || git commit -m "chore: nightly scrape $(date -u +%Y-%m-%d) [skip ci]"
          git push
